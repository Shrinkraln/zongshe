[env:esp32-s3-devkitc-1]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts = pre:force_python.py
;platform_packages=framework-espidf @ symlinl://D:\coding_tools\espidf\5.5\esp-idf-v5.5
build_flags = -D IDF_PATH=\"D:\coding_tools\espidf\5.5\Espressif\"
upload_speed = 115200
board_upload.flash_size = 4MB